# Render Blueprint — FREE lightweight backend for the Attendance System.
#
# This deploys the LIGHTWEIGHT build: FastAPI without the face-recognition stack
# (no TensorFlow/DeepFace/OpenCV/Celery worker), so it fits Render's free tier.
# The face-recognition endpoints return 503 here — those run only in the full
# LOCAL deployment. The database is external (Supabase, free) with pgvector.
#
# Use: Render dashboard → New → Blueprint → pick this repo. Fill the `sync:false`
# values (DATABASE_URL, CORS_ORIGINS, Cloudinary) when prompted.

services:
  - type: web
    name: attendance-api
    runtime: python
    plan: free                 # 512MB — enough for the lightweight build
    rootDir: backend
    buildCommand: "pip install -r requirements-lite.txt"
    # Apply migrations (also enables pgvector on the Supabase DB), then serve.
    startCommand: "alembic upgrade head && gunicorn app.main:app -k uvicorn.workers.UvicornWorker -b 0.0.0.0:$PORT --workers 1 --timeout 120"
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: AI_FEATURES_ENABLED
        value: "false"          # lightweight: face endpoints return 503
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS       # your Vercel URL, e.g. https://your-app.vercel.app
        sync: false
      - key: DATABASE_URL       # Supabase → Connect → Session pooler, + ?sslmode=require
        sync: false
      # Cloudinary is optional for the lite demo (image hosting). Leave blank to skip.
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
