version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: attendance_pgvector
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: attendancedb
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: attendance_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
